<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sean Gallagher | Technical Project Portfolio</title>
  <meta name="description" content="Technical project portfolio for Sean Gallagher: aviation apps, data tools, Raspberry Pi kiosk projects, automation prototypes, and GitHub Pages builds." />
  <style>
    :root {
      --bg: #07111f;
      --bg2: #0c1b2d;
      --card: rgba(255, 255, 255, 0.075);
      --card2: rgba(255, 255, 255, 0.12);
      --text: #f6f8fc;
      --muted: #aab8ca;
      --line: rgba(255, 255, 255, 0.14);
      --blue: #5edcff;
      --amber: #ffc15c;
      --green: #78e3a2;
      --red: #ff6678;
      --purple: #d95cff;
      --shadow: 0 26px 80px rgba(0, 0, 0, 0.35);
      --radius: 24px;
      --max: 1180px;
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: var(--font);
      color: var(--text);
      background:
        radial-gradient(circle at 10% 0%, rgba(94, 220, 255, 0.24), transparent 32rem),
        radial-gradient(circle at 85% 12%, rgba(255, 193, 92, 0.18), transparent 30rem),
        linear-gradient(145deg, #040914 0%, var(--bg) 48%, #0b1524 100%);
      min-height: 100vh;
    }

    a { color: inherit; }
    .wrap { width: min(var(--max), calc(100% - 36px)); margin: 0 auto; }

    .nav {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(18px);
      background: rgba(7, 17, 31, 0.76);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 14px 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      font-weight: 850;
      letter-spacing: -0.035em;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 15px;
      color: #06111e;
      background: linear-gradient(135deg, var(--blue), var(--amber));
      box-shadow: 0 16px 40px rgba(94, 220, 255, 0.18);
    }

    .nav-links {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--muted);
      padding: 9px 12px;
      border-radius: 999px;
      font-size: 0.94rem;
    }

    .nav-links a:hover { background: rgba(255,255,255,.08); color: var(--text); }

    .hero {
      display: grid;
      grid-template-columns: 1.02fr .98fr;
      gap: 38px;
      align-items: center;
      padding: 78px 0 44px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--blue);
      background: rgba(94, 220, 255, 0.10);
      border: 1px solid rgba(94, 220, 255, 0.23);
      padding: 8px 13px;
      border-radius: 999px;
      font-weight: 800;
      font-size: .92rem;
    }

    h1 {
      margin: 24px 0 20px;
      font-size: clamp(2.55rem, 6vw, 5.25rem);
      line-height: .95;
      letter-spacing: -.075em;
    }

    .lead {
      max-width: 68ch;
      margin: 0;
      color: var(--muted);
      font-size: clamp(1.06rem, 1.75vw, 1.26rem);
      line-height: 1.65;
    }

    .hero-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 30px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 18px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 820;
      border: 1px solid rgba(255,255,255,.16);
      transition: transform .16s ease, background .16s ease;
    }

    .btn:hover { transform: translateY(-2px); }
    .btn-primary { color: #06111e; border: 0; background: linear-gradient(135deg, var(--blue), var(--amber)); box-shadow: 0 18px 52px rgba(94, 220, 255, .22); }
    .btn-ghost { background: rgba(255,255,255,.06); color: var(--text); }
    .btn-ghost:hover { background: rgba(255,255,255,.10); }

    .hero-panel {
      position: relative;
      padding: 18px;
      border-radius: 34px;
      border: 1px solid rgba(255,255,255,.16);
      background: linear-gradient(160deg, rgba(255,255,255,.12), rgba(255,255,255,.045));
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero-panel:before {
      content: "";
      position: absolute;
      width: 400px;
      height: 400px;
      right: -120px;
      top: -150px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(94, 220, 255, .30), transparent 68%);
      pointer-events: none;
    }

    .hero-panel img {
      position: relative;
      z-index: 1;
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      object-position: center;
      border-radius: 24px;
      display: block;
      border: 1px solid rgba(255,255,255,.10);
      box-shadow: 0 16px 42px rgba(0,0,0,.28);
      background: rgba(4,12,24,.45);
    }

    .metrics {
      position: relative;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 14px;
      z-index: 1;
    }

    .metric {
      border-radius: 18px;
      padding: 14px;
      background: rgba(255,255,255,.075);
      border: 1px solid rgba(255,255,255,.10);
    }
    .metric strong { display: block; font-size: 1.45rem; letter-spacing: -.045em; margin-bottom: 4px; }
    .metric span { color: var(--muted); font-size: .84rem; }

    section { padding: 46px 0; }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 22px;
    }

    .section-head h2 {
      margin: 0;
      font-size: clamp(1.9rem, 3vw, 3rem);
      line-height: 1;
      letter-spacing: -.055em;
    }

    .section-head p {
      max-width: 60ch;
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .featured-build {
      display: grid;
      grid-template-columns: 1.28fr .72fr;
      gap: 18px;
      align-items: center;
      margin: 24px 0 24px;
      padding: 18px;
      border-radius: 34px;
      background:
        radial-gradient(circle at 24% 0%, rgba(94,220,255,.18), transparent 30rem),
        radial-gradient(circle at 86% 80%, rgba(255,193,92,.13), transparent 26rem),
        rgba(255,255,255,.075);
      border: 1px solid rgba(94,220,255,.23);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .featured-shot {
      position: relative;
      min-height: 300px;
      max-height: 340px;
      border-radius: 26px;
      overflow: hidden;
      background:
        linear-gradient(135deg, rgba(94,220,255,.10), rgba(255,193,92,.08)),
        rgba(0,0,0,.30);
      border: 1px solid rgba(255,255,255,.13);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }

    .featured-shot img {
      width: 100%;
      height: 100%;
      max-height: 320px;
      object-fit: contain;
      object-position: center;
      display: block;
      border-radius: 16px;
      background: rgba(4,12,24,.45);
    }

    .featured-copy {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 4px 4px 4px 0;
    }

    .featured-label {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      color: #06111e;
      background: linear-gradient(135deg, var(--blue), var(--amber));
      font-weight: 900;
      font-size: .84rem;
      letter-spacing: .01em;
    }

    .featured-copy h3 {
      margin: 14px 0 10px;
      font-size: clamp(1.45rem, 2.2vw, 2.35rem);
      line-height: 1.02;
      letter-spacing: -.05em;
    }

    .featured-copy p {
      color: var(--muted);
      line-height: 1.5;
      margin: 0 0 12px;
      font-size: 0.96rem;
    }

    .feature-list {
      display: grid;
      gap: 8px;
      margin: 8px 0 14px;
      padding: 0;
      list-style: none;
    }

    .feature-list li {
      display: flex;
      gap: 10px;
      color: #dce8f7;
      line-height: 1.38;
      font-size: 0.93rem;
    }

    .feature-list li:before {
      content: "✦";
      color: var(--blue);
      flex: 0 0 auto;
    }

    .featured-note {
      color: var(--muted);
      font-size: .88rem;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255,255,255,.065);
      border: 1px solid rgba(255,255,255,.10);
    }

    .filters { display: flex; gap: 10px; flex-wrap: wrap; margin: 22px 0 26px; }
    .filter {
      cursor: pointer;
      font: inherit;
      color: var(--muted);
      background: rgba(255,255,255,.055);
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 999px;
      padding: 10px 14px;
      font-weight: 780;
    }
    .filter.active, .filter:hover { color: #06111e; background: linear-gradient(135deg, var(--blue), var(--amber)); border-color: transparent; }

    .projects { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
    .project {
      display: flex;
      flex-direction: column;
      min-height: 100%;
      overflow: hidden;
      border-radius: var(--radius);
      background: var(--card);
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: 0 14px 44px rgba(0,0,0,.18);
      transition: transform .18s ease, border-color .18s ease, background .18s ease;
    }
    .project:hover { transform: translateY(-5px); background: var(--card2); border-color: rgba(94, 220, 255, .34); }

    .art {
      min-height: 158px;
      padding: 18px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      background:
        radial-gradient(circle at top right, rgba(255,255,255,.18), transparent 14rem),
        linear-gradient(135deg, rgba(94,220,255,.24), rgba(255,193,92,.14));
      border-bottom: 1px solid rgba(255,255,255,.10);
    }
    .icon { font-size: 3.1rem; line-height: 1; filter: drop-shadow(0 16px 22px rgba(0,0,0,.25)); }
    .status { align-self: flex-start; color: #06111e; background: rgba(255,255,255,.80); border-radius: 999px; padding: 6px 10px; font-size: .76rem; font-weight: 900; }

    .body { display: flex; flex-direction: column; flex: 1; padding: 18px; }
    .body h3 { margin: 0 0 10px; font-size: 1.22rem; letter-spacing: -.035em; }
    .body p { margin: 0 0 16px; color: var(--muted); line-height: 1.58; }
    .tags { display: flex; gap: 8px; flex-wrap: wrap; margin-top: auto; padding-top: 10px; }
    .tag { color: #dce8f7; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.10); border-radius: 999px; padding: 6px 9px; font-size: .78rem; font-weight: 750; }
    .links { display: flex; gap: 12px; flex-wrap: wrap; padding-top: 16px; }
    .links a { text-decoration: none; color: var(--text); font-weight: 850; font-size: .92rem; border-bottom: 1px solid rgba(94,220,255,.65); }

    .proof-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
    .proof {
      border-radius: var(--radius);
      background: rgba(255,255,255,.065);
      border: 1px solid rgba(255,255,255,.11);
      padding: 18px;
    }
    .proof strong { display: block; font-size: 1.06rem; margin-bottom: 8px; }
    .proof span { color: var(--muted); line-height: 1.5; font-size: .95rem; }

    .about {
      display: grid;
      grid-template-columns: .95fr 1.05fr;
      gap: 22px;
      align-items: stretch;
      border-radius: 32px;
      padding: 24px;
      background: linear-gradient(
